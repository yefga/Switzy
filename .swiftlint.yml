included:
  - Sources

excluded:
  - Derived
  - .build
  - Tuist

line_length:
  warning: 200
  error: 250

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 400
  error: 500

function_body_length:
  warning: 50
  error: 80

disabled_rules:
  - trailing_whitespace
  - opening_brace

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - private_outlet
  - vertical_whitespace_closing_braces
